name: Exactly Protocol
description: 'Exactly Protocol is a decentralized, non-custodial, open-source protocol
  providing autonomous fixed and variable interest rate credit markets on Ethereum,
  Optimism, and Base. It enables users to deposit and borrow crypto assets at both
  variable rates and fixed rates through maturity pools, using a continuous non-linear
  interest rate model, dynamic close factor liquidations, and a rewards distribution
  system with the EXA governance token.

  '
